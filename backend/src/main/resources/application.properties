spring.application.name=backend
# \uB3C4\uCEE4 \uB85C\uCEEC MySQL \uC5F0\uACB0 \uC124\uC815
spring.datasource.url=jdbc:mysql://localhost:3306/mesh_sos_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# TODO: \uBCF8\uC778\uC758 \uB3C4\uCEE4 MySQL \uACC4\uC815 \uC815\uBCF4(username, password)\uB85C \uBCC0\uACBD\uD558\uAC8C\uB098!
spring.datasource.username=root
spring.datasource.password=1234

# JPA/Hibernate \uC124\uC815
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uD14C\uC774\uBE14 \uC790\uB3D9 \uC0DD\uC131 \uADDC\uCE59 (\uD14C\uC2A4\uD2B8 \uB2E8\uACC4\uC774\uBBC0\uB85C \uAE30\uC874 \uD14C\uC774\uBE14\uC744 \uC720\uC9C0\uD558\uBA70 \uC5C5\uB370\uC774\uD2B8)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect